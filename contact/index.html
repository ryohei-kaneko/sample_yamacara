<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — YAMACARA</title>
<meta name="description" content="YAMACARA へのお問い合わせ。ご質問やご依頼など、お気軽にご連絡ください。">
<link rel="canonical" href="https://yamacara.com/contact/">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta property="og:type" content="website">
<meta property="og:site_name" content="YAMACARA">
<meta property="og:title" content="Contact — YAMACARA">
<meta property="og:description" content="YAMACARA へのお問い合わせ。ご質問やご依頼など、お気軽にご連絡ください。">
<meta property="og:url" content="https://yamacara.com/contact/">
<meta property="og:image" content="https://yamacara.com/images/top01.JPG">
<meta property="og:locale" content="ja_JP">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Contact — YAMACARA">
<meta name="twitter:description" content="YAMACARA へのお問い合わせ。ご質問やご依頼など、お気軽にご連絡ください。">
<meta name="twitter:image" content="https://yamacara.com/images/top01.JPG">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,wght@0,200;0,300;0,400;1,200;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="layout">

  <!-- LEFT -->
  <div class="layout-left">
    <span class="brand-name"><a href="../" class="brand-link">Yamacara</a></span>
    <button class="hamburger" aria-label="メニュー">
      <span></span><span></span><span></span>
    </button>

    <nav class="main-nav">
      <a href="../" class="nav-home-mobile">Home</a>
      <a href="../about/">About</a>
      <a href="../contact/" class="nav-current">Contact</a>
      <span class="nav-disabled">Online Shop<small> — Coming Soon</small></span>
      <a href="https://www.instagram.com/" target="_blank" rel="noopener" class="nav-instagram" aria-label="Instagram">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="4.5"/>
          <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/>
        </svg>
      </a>
    </nav>

    <p class="brand-copy">© YAMACARA</p>
  </div>

  <!-- RIGHT -->
  <div class="layout-right about-right">
    <div class="about-text">
      <h1 class="about-title">Contact</h1>

      <form class="contact-form" action="#" method="post">
        <div class="form-field">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" autocomplete="name" required>
        </div>
        <div class="form-field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" autocomplete="email" required>
        </div>
        <div class="form-field">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="6" required></textarea>
        </div>
        <button type="submit" class="form-submit">Send</button>
      </form>
    </div>
  </div>

</div>

<script src="../burger.js"></script>
</body>
</html>
